<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Card</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Montserrat", sans-serif;
    }

    body {
      background-color: #212121;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 450px;
      height: 200px;
      background: #49708a;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      overflow: hidden; /* IMPORTANT */
    }

    .details {
      width: 50%;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1rem;
    }

    .details h2 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .details span {
      color: #fff;
      font-size: 1.2rem;
    }

    .details button {
      width: fit-content;
      padding: 0.4rem 1rem;
      background-color: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .details button:hover {
      transform: translateY(-4px);
    }

    .image {
      width: 50%;
      height: 100%;
      overflow: hidden;
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="container">
	<div class="card">
		<div class="details">
			<h2>Sonhar UI</h2>
			<span>$ 599,99</span>
			<button>buy</button>
		</div>
		<div class="image">
			<img src="./xwcYIpS.png" alt="shoe" />
		</div>
	</div>
</div>

</body>
</html>
