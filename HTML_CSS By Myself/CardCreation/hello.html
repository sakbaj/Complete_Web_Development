<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Card</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-image: url("image.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main {
            width: 30%;
            height: 30%;
            background-color: rgb(93, 159, 159);
            border-radius: 12px;
            overflow: hidden; /* IMPORTANT */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Image container */
        .image-box {
            width: 100%;
            height: 60%;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text area */
        .content {
            padding: 12px;
        }

        .content h2 {
            font-family: "Montserrat", sans-serif;
            color: whitesmoke;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .content h3 {
            font-family: "Montserrat", sans-serif;
            color: whitesmoke;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="main">
        <div class="image-box">
            <img src="./sneakers.webp" alt="Card Image">
        </div>

        <div class="content">
            <h2>Saksham UI</h2>
            <h3>$599.99</h3>
        </div>
    </div>

</body>
</html>
