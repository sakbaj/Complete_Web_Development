<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-container{
    width:620px;
    background:#fff;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.login-card{
    padding:45px;
}

h1{
    font-size:42px;
    margin-bottom:35px;
    color:#222;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:18px;
    color:#666;
}

input[type="email"],
input[type="password"]{
    width:100%;
    height:55px;
    border:1px solid #d6dbe3;
    border-radius:5px;
    padding:0 15px;
    font-size:17px;
    margin-bottom:28px;
    outline:none;
    transition:.3s;
}

input[type="email"]:focus,
input[type="password"]:focus{
    border-color:#0d6efd;
}

.password-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.password-header a{
    color:#0d6efd;
    text-decoration:none;
    font-size:17px;
}

.password-header a:hover{
    text-decoration:underline;
}

.bottom-section{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.remember{
    display:flex;
    align-items:center;
    gap:10px;
    color:#333;
    font-size:18px;
    cursor:pointer;
}

.remember input{
    width:20px;
    height:20px;
}

button{
    background:#0d6efd;
    color:#fff;
    border:none;
    padding:12px 28px;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0b5ed7;
}

.signup{
    text-align:center;
    background:#f8f9fa;
    padding:28px;
    font-size:20px;
    color:#444;
    border-top:1px solid #eee;
}

.signup a{
    color:#333;
    font-weight:600;
}

.signup a:hover{
    color:#0d6efd;
}

@media(max-width:650px){

    .login-container{
        width:95%;
    }

    .login-card{
        padding:30px;
    }

    h1{
        font-size:34px;
    }

    .bottom-section{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    button{
        width:100%;
    }

}
    </style>
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <h1>Login</h1>

            <form>

                <label>E-Mail Address</label>
                <input type="email" placeholder="">

                <div class="password-header">
                    <label>Password</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <input type="password" placeholder="">

                <div class="bottom-section">

                    <label class="remember">
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <button type="submit">Login</button>

                </div>

            </form>

        </div>

        <div class="signup">
            Don't have an account?
            <a href="#">Create One</a>
        </div>

    </div>

</body>
</html>
